# nim.cfg
# Configuration for the C compiler and the Nim compiler

--threads:on

# Enable SSE2 on x86/x64 platforms for SIMD text search
--passC:"-msse2"
--define:"sse2"

@if release:
  define:danger
  define:lto
  define:strip
  define:ssl

  # Explicitly flags for strip and LTO
  passL:"-s"
  passC:"-flto"
  passL:"-flto"

  # Link against SSL libraries
  passL:"-lssl -lcrypto"

  # Suppress benign LTO warnings common in Nim's generated C code
  passC:"-Wno-stringop-overflow"
  passL:"-Wno-stringop-overflow"
@end
